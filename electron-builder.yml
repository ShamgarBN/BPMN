appId: com.bpmnstudio.app
productName: BPMN Studio
copyright: BPMN Studio

directories:
  output: release/${version}
  buildResources: build

files:
  - dist
  - dist-electron
  - "!**/*.{md,map,d.ts,tsbuildinfo}"
  - "!**/node_modules/**/*"

asar: true
asarUnpack:
  - "**/*.{node,dll}"

# ── macOS ──────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  # User-controlled: codesign locally if you have a Developer ID; CI handles its own
  identity: null
  notarize: false
  artifactName: "${productName}-${version}-${arch}.${ext}"

# ── Windows ────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  # Per-target overrides below give the installer and the portable build
  # distinct filenames so they don't overwrite each other in release/.
  artifactName: "${productName}-${version}-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  shortcutName: BPMN Studio
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: "${productName}-Setup-${version}.${ext}"

portable:
  artifactName: "${productName}-Portable-${version}.${ext}"

# ── Linux ──────────────────────────────────────────────────────────────────
linux:
  category: Office
  synopsis: Build BPMN 2.0 process diagrams locally
  description: BPMN Studio is an offline tool for authoring BPMN 2.0 process diagrams with a guided wizard, visual editor, or local AI assistance.
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  desktop:
    entry:
      Name: BPMN Studio
      Comment: Build BPMN 2.0 process diagrams locally
      Keywords: bpmn;process;workflow;diagram;
  artifactName: "${productName}-${version}.${ext}"

# ── Auto-update ────────────────────────────────────────────────────────────
# Disabled by default. To enable, configure a publisher and re-enable below.
publish: null
